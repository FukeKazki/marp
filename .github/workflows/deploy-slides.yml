name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'slides/**'
      - 'themes/**'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all slides
        run: |
          npx @marp-team/marp-cli@latest -I slides -o output --theme-set themes/tech.css

      - name: Copy assets
        run: |
          if [ -d slides/assets ]; then
            cp -r slides/assets output/
          fi

      - name: Generate index page
        run: |
          cat > output/index.html << 'INDEX'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="Marp でビルドしたスライドの一覧">
            <title>スライド一覧</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
            <style>
              :root {
                --bg0: #0b1220;
                --bg1: #111827;
                --surface: rgba(255, 255, 255, 0.04);
                --surface-hover: rgba(255, 255, 255, 0.08);
                --border: rgba(148, 163, 184, 0.18);
                --text: #e5e7eb;
                --muted: #94a3b8;
                --accent: #38bdf8;
                --accent-dim: rgba(56, 189, 248, 0.15);
                --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
                --radius: 14px;
              }
              *, *::before, *::after { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: "IBM Plex Sans JP", system-ui, -apple-system, sans-serif;
                color: var(--text);
                background:
                  radial-gradient(1200px 600px at 80% -10%, rgba(56, 189, 248, 0.12), transparent 55%),
                  radial-gradient(900px 500px at -5% 100%, rgba(99, 102, 241, 0.1), transparent 50%),
                  linear-gradient(165deg, var(--bg0), var(--bg1) 45%, #0a0f18);
                line-height: 1.6;
              }
              .wrap {
                max-width: 720px;
                margin: 0 auto;
                padding: clamp(2rem, 5vw, 3.5rem) clamp(1.25rem, 4vw, 2rem) 4rem;
              }
              header.page-head {
                margin-bottom: 2.25rem;
                padding-bottom: 1.75rem;
                border-bottom: 1px solid var(--border);
              }
              .eyebrow {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 0.75rem;
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--muted);
                margin: 0 0 0.75rem;
              }
              .eyebrow::before {
                content: "";
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: var(--accent);
                box-shadow: 0 0 12px var(--accent);
              }
              h1 {
                margin: 0;
                font-size: clamp(1.75rem, 4vw, 2.25rem);
                font-weight: 700;
                letter-spacing: -0.02em;
                background: linear-gradient(120deg, #f8fafc 0%, #bae6fd 50%, #e0f2fe 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
              }
              .lede {
                margin: 0.85rem 0 0;
                max-width: 42em;
                font-size: 0.95rem;
                color: var(--muted);
              }
              .slide-list {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 0.65rem;
              }
              .slide-list a {
                display: flex;
                align-items: center;
                justify-content: flex-start;
                gap: 1rem;
                padding: 1rem 1.15rem;
                border-radius: var(--radius);
                text-decoration: none;
                color: inherit;
                background: var(--surface);
                border: 1px solid var(--border);
                box-shadow: var(--shadow);
                transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
              }
              .slide-list a:hover {
                transform: translateY(-2px);
                background: var(--surface-hover);
                border-color: rgba(56, 189, 248, 0.35);
              }
              .slide-list a:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 3px;
              }
              .slide-name {
                flex: 1;
                min-width: 0;
                font-weight: 600;
                font-size: 1.02rem;
                letter-spacing: -0.01em;
                word-break: break-word;
              }
              .slide-actions {
                display: inline-flex;
                align-items: center;
                gap: 0.65rem;
                flex-shrink: 0;
              }
              .slide-pill {
                flex-shrink: 0;
                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--accent);
                background: var(--accent-dim);
                border: 1px solid rgba(56, 189, 248, 0.25);
                padding: 0.35rem 0.6rem;
                border-radius: 999px;
              }
              .chev {
                flex-shrink: 0;
                color: var(--muted);
                opacity: 0.75;
                transition: transform 0.18s ease, opacity 0.18s ease;
              }
              .slide-list a:hover .chev {
                transform: translateX(4px);
                opacity: 1;
                color: var(--accent);
              }
              footer.site-foot {
                margin-top: 2.5rem;
                padding-top: 1.5rem;
                border-top: 1px solid var(--border);
                font-size: 0.8rem;
                color: var(--muted);
              }
              .empty {
                padding: 2rem 1.25rem;
                text-align: center;
                color: var(--muted);
                border: 1px dashed var(--border);
                border-radius: var(--radius);
                background: var(--surface);
              }
              .empty code {
                font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
                font-size: 0.9em;
                color: var(--text);
                background: rgba(255, 255, 255, 0.06);
                padding: 0.12em 0.45em;
                border-radius: 6px;
                border: 1px solid var(--border);
              }
            </style>
          </head>
          <body>
            <div class="wrap">
              <header class="page-head">
                <p class="eyebrow">Slides</p>
                <h1>スライド一覧</h1>
                <p class="lede">ビルド済みの HTML スライドへジャンプできます。各カードをクリックして開いてください。</p>
              </header>
              <ul class="slide-list">
          INDEX
          count=0
          for dir in output/*/; do
            if [ -d "$dir" ]; then
              title=$(basename "$dir")
              count=$((count + 1))
              echo "                <li><a href=\"${title}/${title}.html\"><span class=\"slide-name\">${title}</span><span class=\"slide-actions\"><span class=\"slide-pill\">Open</span><span class=\"chev\" aria-hidden=\"true\">→</span></span></a></li>" >> output/index.html
            fi
          done
          cat >> output/index.html << 'INDEX'
              </ul>
          INDEX
          if [ "${count:-0}" -eq 0 ]; then
            printf '%s\n' '              <p class="empty">まだスライドがありません。<code>slides/</code> 以下に Marp ファイルを追加してプッシュしてください。</p>' >> output/index.html
          fi
          cat >> output/index.html << 'INDEX'
              <footer class="site-foot">
                Built with Marp · GitHub Pages
              </footer>
            </div>
          </body>
          </html>
          INDEX

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
