name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'slides/**'
      - 'themes/**'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all slides
        run: |
          npx @marp-team/marp-cli@latest -I slides -o output --theme-set themes/tech.css

      - name: Copy assets
        run: |
          if [ -d slides/assets ]; then
            cp -r slides/assets output/
          fi

      - name: Generate index page
        run: |
          cat > output/index.html << 'INDEX'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="Marp でビルドしたスライドの一覧">
            <meta name="color-scheme" content="light">
            <title>スライド一覧</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
            <style>
              :root {
                --bg: #f6f4ef;
                --paper: #fffdf8;
                --text: #1c1917;
                --muted: #57534e;
                --border: #d6d3cd;
                --border-strong: #a8a29e;
                --link: #1e3a5f;
                --link-hover: #0f172a;
                --focus: #1e3a5f;
                --radius: 2px;
              }
              *, *::before, *::after { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: "Noto Sans JP", system-ui, -apple-system, "Segoe UI", sans-serif;
                font-size: 1rem;
                color: var(--text);
                background: var(--bg);
                line-height: 1.65;
              }
              .skip-link {
                position: absolute;
                left: 0.75rem;
                top: 0.75rem;
                padding: 0.5rem 0.75rem;
                background: var(--paper);
                color: var(--link);
                border: 1px solid var(--border-strong);
                text-decoration: underline;
                text-underline-offset: 2px;
                z-index: 10;
                transform: translateY(-120%);
                transition: transform 0.15s ease;
              }
              .skip-link:focus {
                transform: translateY(0);
                outline: 2px solid var(--focus);
                outline-offset: 2px;
              }
              .wrap {
                max-width: 40rem;
                margin: 0 auto;
                padding: clamp(2rem, 5vw, 3rem) clamp(1.25rem, 4vw, 1.75rem) 3.5rem;
              }
              header.page-head {
                margin-bottom: 2rem;
                padding-bottom: 1.5rem;
                border-bottom: 1px solid var(--border);
              }
              .page-label {
                margin: 0 0 0.5rem;
                font-size: 0.8125rem;
                font-weight: 500;
                letter-spacing: 0.04em;
                color: var(--muted);
              }
              h1 {
                margin: 0;
                font-family: "Noto Serif JP", "Times New Roman", "Yu Mincho", serif;
                font-size: clamp(1.5rem, 3.5vw, 1.875rem);
                font-weight: 600;
                color: var(--text);
                letter-spacing: 0.02em;
              }
              .lede {
                margin: 0.75rem 0 0;
                max-width: 36em;
                font-size: 0.9375rem;
                color: var(--muted);
              }
              nav[aria-label="スライド一覧"] {
                margin: 0;
              }
              .slide-list {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 0;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                background: var(--paper);
              }
              .slide-list li + li {
                border-top: 1px solid var(--border);
              }
              .slide-list a {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                padding: 0.875rem 1rem;
                text-decoration: none;
                color: var(--link);
                background: transparent;
                border-radius: 0;
                transition: background-color 0.15s ease, color 0.15s ease;
              }
              .slide-list a:hover {
                background: rgba(28, 25, 23, 0.04);
                color: var(--link-hover);
              }
              .slide-list a:focus-visible {
                outline: 2px solid var(--focus);
                outline-offset: -2px;
                position: relative;
                z-index: 1;
              }
              .slide-name {
                flex: 1;
                min-width: 0;
                font-weight: 500;
                font-size: 1rem;
                color: inherit;
                word-break: break-word;
              }
              .slide-hint {
                flex-shrink: 0;
                font-size: 0.8125rem;
                color: var(--muted);
              }
              .slide-list a:hover .slide-hint,
              .slide-list a:focus-visible .slide-hint {
                color: var(--link-hover);
              }
              footer.site-foot {
                margin-top: 2.25rem;
                padding-top: 1.25rem;
                border-top: 1px solid var(--border);
                font-size: 0.8125rem;
                color: var(--muted);
              }
              .empty {
                padding: 1.75rem 1.25rem;
                text-align: center;
                color: var(--muted);
                border: 1px dashed var(--border-strong);
                border-radius: var(--radius);
                background: var(--paper);
              }
              .empty code {
                font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
                font-size: 0.9em;
                color: var(--text);
                background: rgba(28, 25, 23, 0.06);
                padding: 0.1em 0.4em;
                border-radius: 2px;
                border: 1px solid var(--border);
              }
              @media (prefers-reduced-motion: reduce) {
                .skip-link { transition: none; }
                .slide-list a { transition: none; }
              }
            </style>
          </head>
          <body>
            <a class="skip-link" href="#main">本文へスキップ</a>
            <div class="wrap">
              <main id="main">
              <header class="page-head">
                <p class="page-label">スライド</p>
                <h1>スライド一覧</h1>
                <p class="lede">ビルド済みの HTML スライドへ移動できます。行を選んで開いてください。</p>
              </header>
              <nav aria-label="スライド一覧">
                <ul id="slide-list" class="slide-list">
          INDEX
          count=0
          for dir in output/*/; do
            if [ -d "$dir" ]; then
              title=$(basename "$dir")
              if [ "$title" = "assets" ]; then
                continue
              fi
              count=$((count + 1))
              echo "                  <li><a href=\"${title}/${title}.html\"><span class=\"slide-name\">${title}</span><span class=\"slide-hint\">開く</span></a></li>" >> output/index.html
            fi
          done
          cat >> output/index.html << 'INDEX'
                </ul>
          INDEX
          if [ "${count:-0}" -eq 0 ]; then
            printf '%s\n' '                <p class="empty">まだスライドがありません。<code>slides/</code> 以下に Marp ファイルを追加してプッシュしてください。</p>' >> output/index.html
          fi
          cat >> output/index.html << 'INDEX'
              </nav>
              </main>
              <footer class="site-foot">
                Built with Marp · GitHub Pages
              </footer>
            </div>
          </body>
          </html>
          INDEX

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
