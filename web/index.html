<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Marp で作成したスライド集" />
    <meta name="color-scheme" content="dark" />
    <title>Slides — YOSHINANI</title>
